name: Build & Push to DOCR

on:
  push:
    branches:
      - main

permissions:
  id-token: write
  contents: read

env:
  REGISTRY: registry.digitalocean.com
  IMAGE_NAME: coffman

jobs:
  migrate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Fetch secrets from AWS Secrets Manager
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: coffman/app
          parse-json-secrets: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install dependencies
        working-directory: app
        run: npm ci

      - name: Run Prisma migrations
        working-directory: app
        run: npx prisma migrate deploy

  build-and-push:
    runs-on: ubuntu-latest
    needs: migrate

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ap-southeast-1

      - name: Fetch secrets from AWS Secrets Manager
        uses: aws-actions/aws-secretsmanager-get-secrets@v2
        with:
          secret-ids: coffman/app
          parse-json-secrets: true

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ env.COFFMAN_APP_DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DOCR
        run: doctl registry login --expiry-seconds 600

      - name: Build Docker image
        run: |
          docker build \
            --build-arg DATABASE_URL="${{ env.COFFMAN_APP_DATABASE_URL }}" \
            --build-arg JWT_SECRET="${{ env.COFFMAN_APP_JWT_SECRET }}" \
            -t $REGISTRY/${{ env.COFFMAN_APP_DO_REGISTRY_NAME }}/$IMAGE_NAME:${{ github.sha }} \
            ./app

      - name: Push image to DOCR
        run: docker push $REGISTRY/${{ env.COFFMAN_APP_DO_REGISTRY_NAME }}/$IMAGE_NAME:${{ github.sha }}
