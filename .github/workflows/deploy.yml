name: Build & Deploy to DOKS

on:
  push:
    branches:
      - main

env:
  REGISTRY: registry.digitalocean.com
  REGISTRY_NAME: ${{ secrets.DO_REGISTRY_NAME }}
  IMAGE_NAME: coffman
  CLUSTER_NAME: ${{ secrets.DO_CLUSTER_NAME }}

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install doctl
        uses: digitalocean/action-doctl@v2
        with:
          token: ${{ secrets.DIGITALOCEAN_ACCESS_TOKEN }}

      - name: Log in to DigitalOcean Container Registry
        run: doctl registry login --expiry-seconds 600

      - name: Build Docker image
        run: |
          docker build \
            --build-arg DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --build-arg JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            -t $REGISTRY/$REGISTRY_NAME/$IMAGE_NAME:${{ github.sha }} \
            -t $REGISTRY/$REGISTRY_NAME/$IMAGE_NAME:latest \
            ./app

      - name: Push image to registry
        run: |
          docker push $REGISTRY/$REGISTRY_NAME/$IMAGE_NAME:${{ github.sha }}
          docker push $REGISTRY/$REGISTRY_NAME/$IMAGE_NAME:latest

      - name: Get DOKS kubeconfig
        run: doctl kubernetes cluster kubeconfig save $CLUSTER_NAME

      - name: Create or update k8s secret
        run: |
          kubectl create secret generic coffman-secrets \
            --from-literal=DATABASE_URL="${{ secrets.DATABASE_URL }}" \
            --from-literal=JWT_SECRET="${{ secrets.JWT_SECRET }}" \
            --dry-run=client -o yaml | kubectl apply -f -

      - name: Deploy to DOKS
        run: |
          kubectl apply -f k8s/deployment.yml
          kubectl set image deployment/coffman \
            coffman=$REGISTRY/$REGISTRY_NAME/$IMAGE_NAME:${{ github.sha }}
          kubectl rollout status deployment/coffman
